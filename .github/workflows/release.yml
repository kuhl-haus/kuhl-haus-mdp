name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          latest_tag=$(git tag --sort=-creatordate | grep '^v' | head -n1)
          if [[ -z "$latest_tag" ]]; then
            echo "No existing version tags found"
            exit 1
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ github.event.inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"

      - name: Generate changelog
        run: |
          chmod +x update-changelog.sh
          bash update-changelog.sh

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update CHANGELOG.rst for ${{ steps.version.outputs.tag }}"
          title: "Release ${{ steps.version.outputs.tag }}"
          body: |
            ## Release ${{ steps.version.outputs.tag }}

            This PR prepares the repository for release ${{ steps.version.outputs.tag }}.

            ### Changes
            - Updated CHANGELOG.rst with commits since last release
            - Tagged commit as ${{ steps.version.outputs.tag }}

            ### Post-merge actions
            After merging this PR, the tag will be pushed to trigger the PyPI publish workflow.

            **Automated release created by GitHub Actions workflow.**
          branch: "release/${{ steps.version.outputs.tag }}"
          base: mainline
          delete-branch: true
