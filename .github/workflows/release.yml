name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next version
        id: version
        run: |
          latest_tag=$(git tag --sort=-creatordate | grep '^v' | head -n1)
          if [[ -z "$latest_tag" ]]; then
            echo "No existing version tags found"
            exit 1
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "${{ github.event.inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next"

      - name: Create release branch
        run: |
          branch_name="release/${{ steps.version.outputs.tag }}"
          git checkout -b "$branch_name"
          echo "branch=$branch_name" >> "$GITHUB_ENV"

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"

      - name: Generate changelog
        run: |
          chmod +x update-changelog.sh
          bash update-changelog.sh

      - name: Commit and push branch
        run: |
          git add CHANGELOG.rst
          git commit -m "Update CHANGELOG.rst for ${{ steps.version.outputs.tag }}"
          git push origin "${{ env.branch }}"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --body "$(cat <<'EOF'
          ## Release ${{ steps.version.outputs.tag }}

          This PR prepares the repository for release ${{ steps.version.outputs.tag }}.

          ### Changes
          - Updated CHANGELOG.rst with commits since last release
          - Tagged commit as ${{ steps.version.outputs.tag }}

          ### Post-merge actions
          After merging this PR, the tag will be pushed to trigger the PyPI publish workflow.

          **Automated release created by GitHub Actions workflow.**
          EOF
          )" \
            --base mainline \
            --head "${{ env.branch }}"
