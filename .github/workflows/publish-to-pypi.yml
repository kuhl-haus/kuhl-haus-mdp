name: Build, Test, and Release Pipeline
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ mainline ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test Package
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.set_run_id.outputs.run_id }}

    steps:
    - name: Set unique run ID
      id: set_run_id
      run: echo "run_id=${{ github.run_id }}-${{ github.run_number }}" >> $GITHUB_OUTPUT

    # Download and install
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for tags
        persist-credentials: false
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Install test dependencies
      run: pip install -r requirements-test.txt
    - name: Install package
      run: pip install --no-cache-dir -e .

    # Tests
    - name: Run tests with coverage
      run: pdm run pytest --cov=kuhl_haus.mdp --cov-report=html --cov-report=xml tests -v
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: startsWith(github.ref, 'refs/tags/')  # only upload on tag pushes
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: kuhl-haus/kuhl-haus-mdp
        fail_ci_if_error: true

    # Build Distribution Package
    - name: Build package
      run: pdm build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions-${{ steps.set_run_id.outputs.run_id }}
        path: dist/

  build-docker:
    name: Build Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest

    permissions:
      packages: write  # IMPORTANT: mandatory for publishing packages
      # https://docs.github.com/en/packages/learn-github-packages/about-permissions-for-github-packages#about-scopes-and-permissions-for-package-registries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tag
        id: determine_tag
        run: |
          # Try to get tag from git
          GIT_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
      
          if [ -n "$GIT_TAG" ]; then
            # Remove 'v' prefix if present
            IMAGE_TAG=${GIT_TAG#v}
            echo "Using git tag: $IMAGE_TAG"
          else
            # Install setuptools-scm if not already available
            pip install setuptools-scm >/dev/null 2>&1
      
            # Get version from setuptools-scm with no-local-version
            VERSION=$(python -c "from setuptools_scm import get_version; print(get_version(local_scheme='no-local-version'))" 2>/dev/null)
      
            if [ $? -ne 0 ] || [ -z "$VERSION" ]; then
              echo "Error: Could not determine version from setuptools-scm" >&2
              exit 1
            fi
      
            # Add commit hash as suffix for non-tagged builds
            COMMIT_SHORT=$(git rev-parse --short HEAD)
      
            # Format: version-hash (e.g., 0.1.1.dev2-a1b2c3d)
            IMAGE_TAG="${VERSION}-${COMMIT_SHORT}"
            echo "Using setuptools-scm version: $IMAGE_TAG"
          fi
      
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT


      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp:${{ env.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/kuhl-haus-mdp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')  # only release on tag pushes
    needs: [build-and-test, build-docker]
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions-${{ needs.build-and-test.outputs.run_id }}
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v3.0.0
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        "$GITHUB_REF_NAME"
        --repo "$GITHUB_REPOSITORY"
        --notes ""
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release upload
        "$GITHUB_REF_NAME" dist/**
        --repo "$GITHUB_REPOSITORY"

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs: [build-and-test]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/kuhl-haus-mdp
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions-${{ needs.build-and-test.outputs.run_id }}
        path: dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true

  publish-to-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs: [build-and-test, github-release, publish-to-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kuhl-haus-mdp
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions-${{ needs.build-and-test.outputs.run_id }}
        path: dist/

    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://upload.pypi.org/legacy/
        skip-existing: true
